<!DOCTYPE html>
<html>
<head>
  <title>Smart Attendance System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #333;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: gray;
      margin-bottom: 20px;
    }

    input {
      width: 70%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-primary { background: #667eea; }
    .btn-primary:hover { background: #5a67d8; }

    .btn-success { background: #28a745; }
    .btn-success:hover { background: #218838; }

    .btn-info { background: #17a2b8; }
    .btn-info:hover { background: #138496; }

    .btn-danger { background: #dc3545; }
    .btn-danger:hover { background: #c82333; }

    .card {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: white;
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      animation: slideUp 0.5s ease;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: gray;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes slideUp {
      from {transform: translateY(10px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }
  </style>
</head>

<body>

<div class="container">
  <h1>📋 Smart Attendance</h1>
  <div class="subtitle">Cloud-Based Attendance System</div>

  <!-- MARK -->
  <div class="card">
    <h3>🧑 Mark Attendance</h3>
    <input id="name" placeholder="Enter student name">
    <button class="btn-success" onclick="mark()">✔ Present</button>
  </div>

  <!-- ACTIONS -->
  <div class="card">
    <h3>📂 Actions</h3>
    <button class="btn-primary" onclick="view()">📅 View Records</button>
    
    <button class="btn-danger" onclick="clearList()">🧹 Clear</button>
  </div>

  <!-- OUTPUT -->
  <div class="card">
    <h3>📄 Output</h3>
    <ul id="list"></ul>
  </div>

  <div class="footer">
    Made by Bhavesh 🚀 | Cloud Project
  </div>
</div>

<script>
async function mark() {
  const name = document.getElementById("name").value;

  if (!name) {
    alert("⚠ Enter name");
    return;
  }

  await fetch("https://attendance-project-zyqh.onrender.com/mark", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({name: name, status: "Present"})
  });

  alert("✅ Marked!");
  document.getElementById("name").value = "";
}

async function view() {
  const res = await fetch("https://attendance-project-zyqh.onrender.com/view");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(d => {
    list.innerHTML += `
      <li>
        👤 <b>${d.name}</b> - ${d.status} <br>
        📅 ${d.date || "No date"} <br>
        <button onclick="deleteRecord('${d.id}')" 
        style="background:red;color:white;border:none;padding:5px;border-radius:5px;">
        ❌ Delete
        </button>
      </li>
    `;
  });
}

async function deleteRecord(id) {
  await fetch(`https://attendance-project-zyqh.onrender.com/delete${id}`, {
    method: "DELETE"
  });

  alert("🗑 Deleted!");
  view();
}

function clearList() {
  document.getElementById("list").innerHTML = "";
}
</script>

</body>
</html>
